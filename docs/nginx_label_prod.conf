server {
   charset utf-8;
   client_max_body_size 512M;
   sendfile off;

   listen 80; ## listen for ipv4
   #listen [::]:80 default_server ipv6only=on; ## listen for ipv6

   server_name label.kuaibiao.com.cn;
   root        /www/wwwroot/kuaibiao_label/web/web/;
   index       index.html index.htm;

   access_log  /www/wwwlog/label.kuaibiao.com.cn-access.log main;
   error_log   /www/wwwlog/label.kuaibiao.com.cn-error.log;

   # cross domain
    add_header Access-Control-Allow-Origin *;
    add_header Access-Control-Allow-Headers *;
    add_header Access-Control-Allow-Methods GET,POST,PUT,DELETE,OPTIONS;

   location / {
       # Redirect everything that isn't a real file to index.php
       try_files $uri $uri/ /index.html$is_args$args;
   }

   # uncomment to avoid processing of calls to non-existing static files by Yii
   #location ~ \.(js|css|png|jpg|gif|swf|ico|pdf|mov|fla|zip|rar)$ {
   #    try_files $uri =404;
   #}
   #error_page 404 /404.html;

   location ~ /\.(ht|svn|git) {
       deny all;
   }
}

server {
   charset utf-8;
   client_max_body_size 512M;
   sendfile off;

   listen 80; ## listen for ipv4
   #listen [::]:80 default_server ipv6only=on; ## listen for ipv6

   server_name api.label.kuaibiao.com.cn;
   root        /www/wwwroot/kuaibiao_label/api/api/web/;
   index       index.php;

   access_log  /www/wwwlog/api.label.kuaibiao.com.cn-access.log main;
   error_log   /www/wwwlog/api.label.kuaibiao.com.cn-error.log;

    # cross domain
    add_header Access-Control-Allow-Origin *;
    add_header Access-Control-Allow-Headers *;
    add_header Access-Control-Allow-Methods GET,POST,PUT,DELETE,OPTIONS;

   location / {
       # Redirect everything that isn't a real file to index.php
       try_files $uri $uri/ /index.php$is_args$args;
   }

   # uncomment to avoid processing of calls to non-existing static files by Yii
   #location ~ \.(js|css|png|jpg|gif|swf|ico|pdf|mov|fla|zip|rar)$ {
   #    try_files $uri =404;
   #}
   #error_page 404 /404.html;

   location ~ \.php$ {
       include fastcgi_params;
       fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
       fastcgi_pass   127.0.0.1:9000;
       #fastcgi_pass unix:/var/run/php5-fpm.sock;
       try_files $uri =404;
   }

   location ~ /\.(ht|svn|git) {
       deny all;
   }
}

